name: Compile check

# Apenas compila (assembleDebug) — NÃO assina nem cria release. Roda em branches != master/preview.

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - master
      - preview

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
