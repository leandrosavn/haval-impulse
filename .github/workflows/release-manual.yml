name: Release por tag (assinado)

# Builda e publica uma release ASSINADA quando uma tag v* é empurrada. A versão vem da própria
# tag (versionName = tag sem o "v"; versionCode = o 4o número). Tag com "-preview" => pre-release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Versão a partir da tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"                 # ex.: v1.0.0.64-preview
          VERSION="${TAG#v}"                       # 1.0.0.64-preview
          CODE=$(echo "$VERSION" | grep -oP '\d+' | sed -n '4p')   # 4o número = build
          [ -z "$CODE" ] && CODE=1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building $TAG (versionName=$VERSION versionCode=$CODE)"

      - name: Build assinado
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PappVersionName=${{ steps.ver.outputs.version }} \
            -PappVersionCode=${{ steps.ver.outputs.code }}

      - name: Criar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""
          case "${{ steps.ver.outputs.version }}" in *-preview) FLAGS="--prerelease";; esac
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "Release ${{ steps.ver.outputs.version }}" \
            --notes "Build automático da tag ${{ steps.ver.outputs.tag }}" \
            $FLAGS \
            app/build/outputs/apk/release/app-release.apk
